name: Daily Paper Monitor

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: 

# 🌟 就是这一行保平安！强制要求所有插件使用 Node.js 24 运行
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install feedparser openai

      - name: 运行监控脚本
        env:
          DOUBAO_API_KEY: ${{ secrets.DOUBAO_API_KEY }}
          DOUBAO_ENDPOINT_ID: ${{ secrets.DOUBAO_ENDPOINT_ID }}
        run: python monitor_papers.py

      - name: 自动提交更新
        run: |
          git config --global user.name "PaperBot"
          git config --global user.email "bot@github.com"
          git add Latest_Papers.md
          git commit -m "自动更新比色检测最新论文" || exit 0
          git push
