name: Daily Paper Monitor

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: 

# 🌟 就是这一行保平安！强制要求所有插件使用 Node.js 24 运行
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install feedparser openai

      - name: 运行监控脚本
        env:
          DOUBAO_API_KEY: ${{ secrets.DOUBAO_API_KEY }}
          DOUBAO_ENDPOINT_ID: ${{ secrets.DOUBAO_ENDPOINT_ID }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}  # 🌟 加上这关键的一行！
        run: python monitor_papers.py
     
      - name: 提交更新的记忆文件
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add history.txt Latest_Papers.md
          # 如果有更新就提交，没有更新就不管
          git commit -m "🤖 自动更新：记录已读文献" || echo "No changes to commit"
          git push
